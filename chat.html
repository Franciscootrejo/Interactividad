<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metro Chilpancingo</title>
  <!-- Enlace a la biblioteca p5.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.js"></script>
  <!-- Enlace a la tipografía "owltail" -->
  <style>
    body {
      margin: 0;
      overflow: hidden; /* Evitar scroll */
      font-family: "Owltail", sans-serif;
    }
    .text-effect {
      font-size: 3rem;
      font-weight: bold;
      position: relative;
      display: inline-block;
      color: #333;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .text-effect:hover {
      letter-spacing: 5px;
      transform: scaleX(1.2);
      text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
    }

  </style>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div class="text-effect">Metro Chilpancingo</div>

  <script src="./js/chat.js"></script>
</body>
</html>
