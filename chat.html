<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Texto con efecto</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color:rgba(0, 0, 0, 0.3)
      font-family: Arial, sans-serif;
    }

    .text-effect {
      font-size: 3rem;
      font-weight: bold;
      position: relative;
      display: inline-block;
      color: #333;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .text-effect:hover {
      letter-spacing: 5px;
      transform: scaleX(1.2);
      text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
    }
  </style>
</head>
<body>
  <div class="text-effect">Metro Chilpancingo</div>
</body>
</html>
